<section class="composer glass-card">
  <div class="composer__quick">
    @for (action of quickActions; track action) {
      <button type="button" (click)="quickMessage.emit(action)">{{ action }}</button>
    }
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="composer__form">
    <label class="sr-only" for="latido-message">Escribe tu mensaje</label>
    <input
      id="latido-message"
      type="text"
      formControlName="text"
      placeholder="Escribe un detalle, un recuerdo o un pequeño latido..."
    />
    <button type="submit">Enviar ahora</button>
  </form>
</section>
